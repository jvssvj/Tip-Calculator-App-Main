<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="src/index.css">
  <link rel="stylesheet" href="src/responsiveIndex.css">
  <script src="src/index.js" defer></script>
  
  
  <title>Frontend Mentor | Tip calculator app</title>


</head>
<body>
  <div class="logo">
    <img src="images/logo.svg" alt="SPLITTER">
  </div>
  <section class="card">
    <section class="card-left">
      <div class="div-bill">
        <div class="bill-label">
          <label for="billinput">Bill</label>
          <span class="error">Can't be zero</span>
        </div>
        <input type="number" name="billinput" id="billinput" placeholder="0">
      </div>
      <div class="select-tip">
        <span>Select Tip %</span>
        <div class="percentages">
          <input id="five" type="button" value="5%">
          <input id="ten" type="button" value="10%">
          <input id="fifteen" type="button" value="15%">
          <input id="twenty-five" type="button" value="25%">
          <input id="fifty" type="button" value="50%">
          <input id="custominput" type="number" name="tip" id="tip" placeholder="Custom">
        </div>
      </div>
      <div class="numberpeople">
        <div class="numberpeople-label">
          <label for="numberpeopleinput">Number of People</label>
          <span class="error">Can't be zero</span>
        </div>
        <input type="number" name="numberpeopleinput" id="numberpeopleinput" placeholder="0">
      </div>
    </section>
    <section class="card-right">
      <div class="tip-amount">
        <div class="tip-amount-text">
          <p>Tip Amount</p>
          <span>/ person</span>
        </div>
        <div class="tip-amount-result">
          <span class="dolar-icon">$</span>
          <p id="amount-result">0.00</p>
        </div>
      </div>
      <div class="total">
        <div class="total-text">
          <p>Total</p>
          <span>/ person</span>
        </div>
        <div class="total-result">
          <span class="dolar-icon">$</span>
          <p id="total-result">0.00</p>
        </div>
      </div>
      <input id="reset" type="button" value="reset">
    </section>
  </section>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io" target="_blank">Frontend Mentor</a>.
    Coded by <a href="https://www.linkedin.com/feed/" target="_blank">João Vitor</a>.
  </div>
</body>
</html>
